<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Mobile Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #007AFF 0%, #005ecb 100%); /* Màu xanh kiểu iMessage */
            --bg-color: #f2f2f7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            height: 100dvh; /* Chiều cao thực tế trên mobile */
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden; /* Chặn cuộn toàn trang */
        }

        /* --- KHUNG CHAT (App Container) --- */
        .app-container {
            width: 100%;
            max-width: 600px; /* Giới hạn chiều rộng trên máy tính */
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 1. HEADER (Cố định trên cùng) */
        .header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 17px;
            z-index: 10;
            height: 60px;
        }

        /* 2. NỘI DUNG CHAT (Cuộn) */
        .chat-area {
            flex: 1; /* Chiếm hết khoảng trống */
            padding: 15px;
            overflow-y: auto; /* Cuộn dọc */
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
        }

        /* Bong bóng chat */
        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 16px; /* Cỡ chữ dễ đọc */
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        /* User: Màu xanh, bên phải */
        .user {
            align-self: flex-end;
            background: #007AFF;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* AI: Màu xám, bên trái */
        .ai {
            align-self: flex-start;
            background: #e5e5ea;
            color: black;
            border-bottom-left-radius: 4px;
        }

        /* Hiệu ứng Loading 3 chấm */
        .typing {
            display: none;
            align-self: flex-start;
            background: #e5e5ea;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            width: fit-content;
        }
        .dot { width: 6px; height: 6px; background: #8e8e93; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* 3. INPUT AREA (Cố định dưới cùng) */
        .input-area {
            padding: 10px 15px;
            background: white;
            border-top: 1px solid #c6c6c8;
            display: flex;
            align-items: center;
            gap: 10px;
            /* Fix cho iPhone X trở lên */
            padding-bottom: env(safe-area-inset-bottom, 15px); 
        }

        input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #c6c6c8;
            font-size: 16px;
            outline: none;
            background: #fff;
            height: 40px;
        }
        input:focus { border-color: #007AFF; }

        button {
            width: 40px; height: 40px;
            border-radius: 50%; border: none;
            background: #007AFF; color: white;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        button:disabled { background: #c6c6c8; }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <i class="fas fa-robot" style="margin-right: 8px; color: #007AFF;"></i> Trợ Lý Ảo
    </div>

    <!-- Vùng Chat -->
    <div class="chat-area" id="chatBox">
        <div class="message ai">Chào bạn! Mình có thể giúp gì?</div>
        
        <!-- Loading -->
        <div class="typing" id="loading">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
    </div>

    <!-- Nhập liệu -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
    </div>
</div>

<script>
    // --- CẤU HÌNH ---
    const WORKER_URL = "https://muddy-paper-3417.nhatanhd50.workers.dev/";
    const API_KEY = "12345678"; 
    // ----------------

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    let history = [];

    // Tự động cuộn xuống dưới cùng khi mới vào
    window.onload = () => scrollToBottom();

    // Sự kiện nhấn Enter
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Hiện tin User
        appendMessage(text, 'user');
        userInput.value = ''; // Xóa chữ trong ô nhập
        
        // Ẩn bàn phím ngay lập tức (Quan trọng trên Mobile)
        userInput.blur(); 

        // Khóa nút gửi
        toggleInput(false);
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: text,
                    history: history
                })
            });

            if (!res.ok) throw new Error("Lỗi kết nối");
            
            const data = await res.json();
            const aiText = data.response || "Xin lỗi, tôi chưa hiểu.";

            // 2. Hiện tin AI
            loading.style.display = 'none';
            appendMessage(aiText, 'ai');

            // Lưu lịch sử
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Lỗi mạng rồi!", 'ai');
        } finally {
            // Mở khóa nút gửi
            toggleInput(true);
            
            // QUAN TRỌNG: KHÔNG GỌI userInput.focus() ở đây nữa
            // Bàn phím sẽ KHÔNG tự bật lên
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        // Chuyển đổi xuống dòng
        div.innerHTML = text.replace(/\n/g, "<br>");
        
        // Chèn trước loading
        chatBox.insertBefore(div, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
