<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #eef2f5;
            height: 100dvh; /* Dùng dvh để fix lỗi thanh địa chỉ trên mobile */
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Chặn cuộn body */
        }

        /* --- KHUNG CHAT (CARD) --- */
        .chat-card {
            background: white;
            width: 450px;
            height: 85vh; /* Mặc định cao 85% màn hình */
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        /* --- QUAN TRỌNG: RESPONSIVE CHO MOBILE --- */
        /* Khi màn hình nhỏ hơn 600px (Điện thoại) -> Chuyển sang Full Màn hình */
        @media (max-width: 600px) {
            .chat-card {
                width: 100%;
                height: 100dvh; /* Chiếm trọn chiều cao thiết bị */
                border-radius: 0; /* Bỏ bo góc */
                box-shadow: none;
            }
            body {
                background: white; /* Nền trắng luôn cho đồng bộ */
            }
        }

        /* 1. Header (Luôn gim trên cùng) */
        .card-header {
            padding: 15px 20px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0; /* Không bị co lại */
        }
        .avatar {
            width: 40px; height: 40px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        
        /* 2. Nội dung Chat (Phần co giãn) */
        .chat-body {
            flex: 1; /* Tự động chiếm hết khoảng trống còn lại */
            padding: 20px;
            overflow-y: auto; /* Cuộn dọc */
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        
        /* 3. Input Area (Luôn gim dưới cùng) */
        .card-footer {
            padding: 10px 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0; /* Không bị co lại */
        }
        
        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            background: #f5f5f5;
            font-size: 16px; /* Font 16px để tránh iOS tự zoom */
        }
        input:focus { background: white; border-color: #764ba2; }

        button {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: var(--primary-gradient); color: white; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Style Tin nhắn */
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .ai { align-self: flex-start; background: #fff; border: 1px solid #e5e5e5; color: #333; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: #667eea; color: white; border-bottom-right-radius: 4px; }
        
        /* Loading */
        .typing { display: none; margin-left: 10px; font-size: 12px; color: #888; margin-bottom: 10px; }

    </style>
</head>
<body>

    <div class="chat-card">
        <!-- Header -->
        <div class="card-header">
            <div class="avatar"><i class="fas fa-robot"></i></div>
            <div>
                <h3 style="margin: 0; font-size: 16px;">AI Assistant</h3>
                <small style="opacity: 0.8;">Online</small>
            </div>
        </div>

        <!-- Nội dung -->
        <div class="chat-body" id="chatBody">
            <div class="message ai">Xin chào! Mình có thể giúp gì cho bạn?</div>
            <div class="typing" id="loading">AI đang nhập...</div>
        </div>

        <!-- Nhập liệu -->
        <div class="card-footer">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

<script>
    // --- CẤU HÌNH ---
    const WORKER_URL = "https://muddy-paper-3417.nhatanhd50.workers.dev/";
    const API_KEY = "12345678"; 
    // ----------------

    const chatBody = document.getElementById('chatBody');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    let history = [];

    // Fix lỗi chiều cao trên Mobile (iOS Safari)
    // Khi bàn phím hiện lên, nó sẽ tính toán lại chiều cao để Input không bị che
    const setHeight = () => {
        document.body.style.height = window.innerHeight + "px";
    };
    window.addEventListener("resize", setHeight);
    setHeight();

    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        userInput.disabled = true;
        sendBtn.disabled = true;
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: text, history: history })
            });
            const data = await res.json();
            const aiText = data.response || "Lỗi phản hồi.";
            
            loading.style.display = 'none';
            appendMessage(aiText, 'ai');
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (e) {
            loading.style.display = 'none';
            appendMessage("Lỗi kết nối", 'ai');
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = text.replace(/\n/g, "<br>");
        chatBody.insertBefore(div, loading);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }
</script>

</body>
</html>
