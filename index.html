<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI Professional</title>
    <!-- Thêm Icon cho đẹp -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU TRÚC CHÍNH (LAYOUT CỐ ĐỊNH) --- */
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            height: 100%; /* Chiếm full màn hình */
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            overflow: hidden; /* Chặn cuộn cả trang web */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Chiều cao bằng đúng màn hình thiết bị */
            max-width: 800px; /* Giới hạn chiều rộng cho giống app */
            margin: 0 auto; /* Căn giữa màn hình */
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 1. HEADER (CỐ ĐỊNH) */
        .chat-header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .header-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #0084ff; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .status { font-size: 16px; font-weight: 600; color: #050505; }
        .sub-status { font-size: 13px; color: #65676b; }
        .dot { width: 8px; height: 8px; background: #31a24c; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* 2. KHUNG CHAT (CUỘN ĐƯỢC) */
        .chat-messages {
            flex: 1; /* Chiếm toàn bộ khoảng trống còn lại */
            overflow-y: auto; /* Cho phép cuộn dọc */
            padding: 20px;
            background-color: #f0f2f5; /* Màu nền xám nhẹ giống Messenger */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* Tùy chỉnh thanh cuộn cho đẹp */
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: #bcc0c4; border-radius: 10px; }

        /* Bong bóng chat */
        .message-row { display: flex; width: 100%; }
        .message-bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        /* User Style */
        .user-row { justify-content: flex-end; }
        .user-bubble {
            background-color: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* AI Style */
        .ai-row { justify-content: flex-start; }
        .ai-bubble {
            background-color: #e4e6eb;
            color: #050505;
            border-bottom-left-radius: 4px;
        }
        .ai-avatar-small {
            width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center; margin-right: 8px; align-self: flex-end; font-size: 14px;
        }

        /* Hiệu ứng 3 chấm loading */
        .typing-indicator {
            display: none;
            background: #e4e6eb;
            padding: 8px 12px;
            border-radius: 18px;
            width: fit-content;
            margin-left: 36px; /* Căn thẳng với tin nhắn AI */
            margin-bottom: 10px;
        }
        .typing-dot {
            height: 6px; width: 6px; background: #65676b; border-radius: 50%; display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both; margin: 0 1px;
        }
        .typing-dot:nth-child(1){ animation-delay: -0.32s; }
        .typing-dot:nth-child(2){ animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* 3. INPUT AREA (CỐ ĐỊNH Ở ĐÁY) */
        .chat-input-area {
            padding: 15px;
            background: #fff;
            border-top: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid #ddd; /* Màu viền nhẹ */
            background: #f0f2f5;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }
        input:focus { background: #fff; border-color: #0084ff; }
        
        button {
            width: 40px; height: 40px; border: none; background: transparent; color: #0084ff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s;
        }
        button:hover { background: #f2f2f2; }
        button:disabled { color: #ccc; cursor: default; }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-info">
            <div class="avatar"><i class="fas fa-robot"></i></div>
            <div>
                <div class="status">Trợ lý AI</div>
                <div class="sub-status"><span class="dot"></span>Đang hoạt động</div>
            </div>
        </div>
        <div style="color: #0084ff; cursor: pointer;"><i class="fas fa-info-circle"></i></div>
    </div>

    <!-- Khung Chat -->
    <div class="chat-messages" id="chatBox">
        <!-- Tin nhắn chào mừng -->
        <div class="message-row ai-row">
            <div class="ai-avatar-small"><i class="fas fa-robot"></i></div>
            <div class="message-bubble ai-bubble">Xin chào! Mình có thể giúp gì cho bạn?</div>
        </div>

        <!-- Loading -->
        <div class="typing-indicator" id="loading">
            <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
    </div>

    <!-- Ô nhập liệu -->
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // ==========================================
    // CẤU HÌNH (Đã điền sẵn Key của bạn)
    // ==========================================
    const WORKER_URL = "https://muddy-paper-3417.nhatanhd50.workers.dev/";
    const API_KEY = "12345678"; 
    // ==========================================

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    let history = []; 

    // Tự động focus vào ô nhập khi mở trang
    userInput.focus();

    // Xử lý phím Enter
    userInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Hiện tin User
        appendMessage(text, 'user');
        userInput.value = '';
        
        // Khóa input & hiện loading
        toggleInput(false);
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: text,
                    history: history
                })
            });

            if (!res.ok) throw new Error("Lỗi kết nối Server");

            const data = await res.json();
            const aiText = data.response || "Không có phản hồi.";

            // 2. Hiện tin AI
            loading.style.display = 'none';
            appendMessage(aiText, 'ai');

            // Lưu history
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("⚠️ Lỗi: " + error.message, 'ai');
        } finally {
            toggleInput(true);
            userInput.focus();
        }
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `message-row ${sender}-row`;

        // Nếu là AI thì thêm cái avatar nhỏ
        let avatarHtml = '';
        if (sender === 'ai') {
            avatarHtml = `<div class="ai-avatar-small"><i class="fas fa-robot"></i></div>`;
        }

        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${sender}-bubble`;
        
        // Xử lý xuống dòng (\n) thành thẻ <br>
        bubble.innerHTML = text.replace(/\n/g, "<br>");

        if (sender === 'ai') {
            row.innerHTML = avatarHtml;
            row.appendChild(bubble);
        } else {
            row.appendChild(bubble);
        }

        // Chèn trước cái loading
        chatBox.insertBefore(row, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        sendBtn.style.opacity = enabled ? "1" : "0.5";
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
