<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Central</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh; /* Full màn hình */
            width: 100vw;
            overflow: hidden; /* CHẶN CUỘN TRANG WEB -> GIỮ CỐ ĐỊNH */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Căn giữa khung chat */
            display: flex;
            justify-content: center;
            align-items: center;

            /* Trang trí nền */
            background: #e0eafc; 
            background: -webkit-linear-gradient(to right, #cfdef3, #e0eafc); 
            background: linear-gradient(to right, #cfdef3, #e0eafc); 
            position: relative;
        }

        /* --- TRANG TRÍ NỀN (DECORATION) --- */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1; /* Nằm dưới khung chat */
            opacity: 0.6;
        }
        .circle-1 {
            width: 300px; height: 300px;
            background: #ff9a9e;
            top: -50px; left: -50px;
            animation: float 6s ease-in-out infinite;
        }
        .circle-2 {
            width: 400px; height: 400px;
            background: #a18cd1;
            bottom: -100px; right: -100px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
            100% { transform: translateY(0px); }
        }

        /* --- KHUNG CHAT (CARD) --- */
        .chat-card {
            width: 450px; /* Chiều rộng cố định */
            height: 80vh; /* Chiều cao chiếm 80% màn hình */
            max-width: 95%; /* Responsive cho mobile */
            background: rgba(255, 255, 255, 0.95); /* Hiệu ứng kính mờ */
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            z-index: 10; /* Nằm trên lớp trang trí */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden; /* Bo tròn góc */
        }

        /* Header */
        .card-header {
            padding: 20px;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-avatar {
            width: 45px; height: 45px;
            background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #2575fc; font-size: 20px;
        }
        .header-title h3 { margin: 0; font-size: 18px; }
        .header-title p { margin: 0; font-size: 12px; opacity: 0.8; }

        /* Nội dung Chat (Phần duy nhất cuộn) */
        .chat-body {
            flex: 1; /* Chiếm hết khoảng trống */
            padding: 20px;
            overflow-y: auto; /* Cho phép cuộn dọc */
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        
        /* Tùy chỉnh thanh cuộn */
        .chat-body::-webkit-scrollbar { width: 5px; }
        .chat-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        /* Bong bóng chat */
        .message {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-content {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 75%;
            word-wrap: break-word;
        }

        /* AI Style */
        .ai .msg-content {
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .ai-icon {
            width: 28px; height: 28px; background: #e4e6eb; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: #555;
        }

        /* User Style */
        .user { flex-direction: row-reverse; }
        .user .msg-content {
            background: #2575fc;
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(37, 117, 252, 0.2);
        }

        /* Input Area */
        .card-footer {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            background: #f9f9f9;
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus { background: white; border-color: #2575fc; box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.1); }
        
        button {
            width: 45px; height: 45px;
            border-radius: 50%; border: none;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white; font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        button:hover { transform: scale(1.1); }
        button:disabled { background: #ccc; cursor: default; transform: none; }

        /* Loading Dots */
        .typing {
            display: none;
            margin-left: 40px;
            padding: 10px;
            background: #f0f2f5;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 10px;
        }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    </style>
</head>
<body>

    <!-- Trang trí nền -->
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>

    <!-- Khung Chat Chính -->
    <div class="chat-card">
        <!-- 1. Header -->
        <div class="card-header">
            <div class="header-avatar"><i class="fas fa-robot"></i></div>
            <div class="header-title">
                <h3>Trợ Lý Ảo</h3>
                <p>Luôn sẵn sàng 24/7</p>
            </div>
        </div>

        <!-- 2. Nội dung Chat -->
        <div class="chat-body" id="chatBody">
            <div class="message ai">
                <div class="ai-icon"><i class="fas fa-robot"></i></div>
                <div class="msg-content">Xin chào! Tôi có thể giúp gì cho bạn?</div>
            </div>
            
            <div class="typing" id="loading">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>

        <!-- 3. Nhập liệu -->
        <div class="card-footer">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

<script>
    // --- CẤU HÌNH ---
    const WORKER_URL = "https://muddy-paper-3417.nhatanhd50.workers.dev/";
    const API_KEY = "12345678"; // Key giả lập local của bạn
    // ----------------

    const chatBody = document.getElementById('chatBody');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    let history = [];

    // Focus ngay vào ô nhập
    userInput.focus();

    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. User Message
        appendMessage(text, 'user');
        userInput.value = '';
        
        // Khóa input
        toggleInput(false);
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: text,
                    history: history
                })
            });

            if (!res.ok) throw new Error("Lỗi kết nối Server");
            const data = await res.json();
            const aiText = data.response || "Không có phản hồi.";

            // 2. AI Message
            loading.style.display = 'none';
            appendMessage(aiText, 'ai');

            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Lỗi: " + error.message, 'ai');
        } finally {
            toggleInput(true);
            userInput.focus();
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;

        let iconHtml = '';
        if (sender === 'ai') {
            iconHtml = `<div class="ai-icon"><i class="fas fa-robot"></i></div>`;
        }

        const contentDiv = document.createElement('div');
        contentDiv.className = 'msg-content';
        contentDiv.innerHTML = text.replace(/\n/g, "<br>");

        if (sender === 'ai') {
            msgDiv.innerHTML = iconHtml;
            msgDiv.appendChild(contentDiv);
        } else {
            msgDiv.appendChild(contentDiv);
        }

        chatBody.insertBefore(msgDiv, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
    }

    // Cuộn xuống chỉ trong phạm vi chat-body
    function scrollToBottom() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }
</script>

</body>
</html>
